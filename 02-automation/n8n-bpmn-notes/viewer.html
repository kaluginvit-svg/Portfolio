<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BPMN — Кейсы автоматизации</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; }
    .header { padding: 1rem 1.5rem; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    .header h1 { margin: 0; font-size: 1.25rem; font-weight: 600; }
    .tabs { display: flex; gap: 0.25rem; }
    .tabs button { padding: 0.5rem 1rem; border: 1px solid #444; background: #2a2a4a; color: #ccc; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .tabs button:hover { background: #3a3a5a; color: #fff; }
    .tabs button.active { background: #4361ee; border-color: #4361ee; color: #fff; }
    #canvas { width: 100%; height: calc(100vh - 56px); min-height: 400px; }
    .error { padding: 1rem; margin: 1rem; background: #4a1515; border-radius: 8px; color: #faa; }
    .hint { padding: 0.5rem 1rem; font-size: 0.8rem; color: #888; }
  </style>
</head>
<body>
  <div class="header">
    <h1>BPMN: Кейс 1 — Студия ботов · Кейс 2 — Рекрутинг</h1>
    <div class="tabs">
      <button type="button" class="active" data-diagram="case1-telegram-bot-studio.bpmn">Кейс 1: Студия Telegram-ботов</button>
      <button type="button" data-diagram="case2-it-recruiting.bpmn">Кейс 2: Рекрутинг IT</button>
    </div>
  </div>
  <p class="hint">Откройте страницу через локальный сервер (например: python -m http.server 8080), чтобы загрузка .bpmn файлов работала.</p>
  <div id="canvas"></div>
  <div id="error" class="error" style="display: none;"></div>

  <script src="https://unpkg.com/bpmn-js@17.4.1/dist/bpmn-navigated-viewer.production.min.js"></script>
  <script>
    const container = document.getElementById('canvas');
    const errorEl = document.getElementById('error');
    let viewer = null;
    let currentUrl = 'case1-telegram-bot-studio.bpmn';

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }
    function hideError() {
      errorEl.style.display = 'none';
    }

    async function loadDiagram(url) {
      hideError();
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('Файл не найден. Запустите локальный сервер в папке BPMN (например: python -m http.server 8080).');
        const xml = await res.text();
        if (!viewer) {
          viewer = new BpmnNavigatedViewer({ container });
        }
        await viewer.importXML(xml);
        viewer.get('canvas').zoom('fit-viewport');
      } catch (err) {
        showError(err.message || String(err));
      }
    }

    document.querySelectorAll('.tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelector('.tabs button.active').classList.remove('active');
        btn.classList.add('active');
        currentUrl = btn.dataset.diagram;
        loadDiagram(currentUrl);
      });
    });

    loadDiagram(currentUrl);
  </script>
</body>
</html>
