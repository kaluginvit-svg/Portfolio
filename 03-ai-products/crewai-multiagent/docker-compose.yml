version: '3.8'

services:
  seo-crew-api:
    build: .
    container_name: seo-crew-api
    ports:
      - "8001:8001"  # Внешний порт 8001
    env_file:
      - .env
    volumes:
      # Монтируем папки для результатов и логов
      - ./results:/app/results
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
