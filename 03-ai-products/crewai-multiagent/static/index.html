<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Crew - Анализ веб-страниц</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input[type="url"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="url"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            display: none;
            margin-top: 20px;
        }

        .result.active {
            display: block;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .result-header h2 {
            color: #333;
            font-size: 1.5em;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }

        .result-content {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #dc3545;
        }

        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .info-box p {
            margin: 5px 0;
            color: #1976D2;
        }

        .url-display {
            color: #667eea;
            word-break: break-all;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 SEO Crew</h1>
            <p>Автоматизированный анализ веб-страниц с помощью AI</p>
        </div>

        <div class="card">
            <form id="analysisForm">
                <div class="form-group">
                    <label for="url">URL страницы для анализа:</label>
                    <input 
                        type="url" 
                        id="url" 
                        name="url" 
                        placeholder="https://example.com" 
                        required
                    >
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="saveToFile" name="saveToFile" checked>
                        <label for="saveToFile" style="margin: 0; font-weight: normal;">
                            Сохранить результат в файл
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn" id="submitBtn">
                    Запустить анализ
                </button>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Выполняется анализ... Это может занять несколько минут.</p>
            </div>

            <div class="result" id="result">
                <div class="result-header">
                    <h2>Результат анализа</h2>
                    <span class="status-badge status-success" id="statusBadge">Успешно</span>
                </div>
                <div class="info-box" id="urlInfo"></div>
                <div class="result-content" id="resultContent"></div>
            </div>

            <div class="error-message" id="errorMessage" style="display: none;"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8001';
        
        const form = document.getElementById('analysisForm');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const resultContent = document.getElementById('resultContent');
        const errorMessage = document.getElementById('errorMessage');
        const urlInfo = document.getElementById('urlInfo');
        const statusBadge = document.getElementById('statusBadge');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const url = document.getElementById('url').value.trim();
            const saveToFile = document.getElementById('saveToFile').checked;

            // Скрыть предыдущие результаты
            result.classList.remove('active');
            errorMessage.style.display = 'none';

            // Показать загрузку
            loading.classList.add('active');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Анализ выполняется...';

            try {
                const response = await fetch(`${API_BASE_URL}/analyze`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        url: url,
                        save_to_file: saveToFile
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Ошибка при выполнении анализа');
                }

                // Показать результат
                urlInfo.innerHTML = `<p><strong>Проанализированный URL:</strong> <span class="url-display">${data.url}</span></p>`;
                
                if (data.tasks_completed) {
                    urlInfo.innerHTML += `<p><strong>Выполнено задач:</strong> ${data.tasks_completed}</p>`;
                }

                resultContent.textContent = data.result || 'Результат не получен';
                statusBadge.textContent = 'Успешно';
                statusBadge.className = 'status-badge status-success';
                result.classList.add('active');

            } catch (error) {
                // Показать ошибку
                errorMessage.textContent = `Ошибка: ${error.message}`;
                errorMessage.style.display = 'block';
                statusBadge.textContent = 'Ошибка';
                statusBadge.className = 'status-badge status-error';
            } finally {
                // Скрыть загрузку
                loading.classList.remove('active');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Запустить анализ';
            }
        });

        // Проверка доступности API при загрузке страницы
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                if (!response.ok) {
                    throw new Error('API недоступен');
                }
            } catch (error) {
                errorMessage.textContent = `⚠️ API сервер недоступен. Убедитесь, что сервер запущен на ${API_BASE_URL}`;
                errorMessage.style.display = 'block';
                submitBtn.disabled = true;
            }
        });
    </script>
</body>
</html>
