services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app
      DATABASE_URL: sqlite:////app/data/crm.db
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      LOG_LEVEL: INFO
    volumes:
      - ./backend:/app/backend
      - ./google_integration:/app/google_integration
      - ./config:/app/config
      - ./data:/app/data
    command: >
      uvicorn backend.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/backend
      --reload-dir /app/google_integration
