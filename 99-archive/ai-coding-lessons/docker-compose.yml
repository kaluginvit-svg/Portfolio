# Запуск: docker compose up --build
# Проверка API с хоста: python scripts/check_api.py
services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      DB_PATH: /app/data/users.db
      PASSWORDS_FILE: /app/data/passwords.txt
    volumes:
      - app_data:/app/data

volumes:
  app_data:
