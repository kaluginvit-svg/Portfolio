openapi: 3.1.0
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base

info:
  title: Users & passwords API
  version: 1.0.0
  description: |
    HTTP API учебного проекта (регистрация пользователя в SQLite и опциональная запись PBKDF2-хеша пароля в файл).

    Реализации с совпадающим контрактом:
    - **Flask** (`app.py`) — по умолчанию порт `5000`.
    - **Go** (`go-server/cmd/userserver`) — по умолчанию адрес `:8080` (переменные `HTTP_ADDR`, `PORT`).

    Перед использованием `POST /users` должна существовать таблица `users` в SQLite (см. `schema.sql` в `go-server/` или README).

    Несоответствие HTTP-метода пути (например `POST /health` или `GET /users`) возвращает **405**; тело ответа в реализациях на Go может быть текстом `Method Not Allowed`, не JSON.

servers:
  - url: http://127.0.0.1:5000
    description: Flask (типичный `flask run`)
  - url: http://127.0.0.1:8080
    description: Go-сервер (значение по умолчанию)

tags:
  - name: health
    description: Проверка доступности сервиса
  - name: users
    description: Пользователи

paths:
  /health:
    get:
      tags: [health]
      summary: Проверка живости
      operationId: getHealth
      responses:
        "200":
          description: Сервис отвечает
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    status: ok

  /users:
    post:
      tags: [users]
      summary: Создать пользователя
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
            examples:
              full:
                summary: Имя, теги и пароль
                value:
                  name: Alice
                  tags: [student]
                  password: secret
              nameOnly:
                summary: Только имя
                value:
                  name: Bob
      responses:
        "201":
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedUserResponse"
              examples:
                created:
                  value:
                    id: 1
        "400":
          description: Некорректное тело или поля
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notObject:
                  summary: Тело не JSON-объект
                  value:
                    error: ожидается JSON-объект
                nameRequired:
                  summary: Нет имени или не строка
                  value:
                    error: поле name (строка) обязательно
                tagsInvalid:
                  summary: tags не массив
                  value:
                    error: поле tags должно быть массивом или отсутствовать
                passwordInvalid:
                  summary: password не строка
                  value:
                    error: поле password должно быть строкой или отсутствовать
        "500":
          description: Ошибка БД или записи файла паролей
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                failed:
                  value:
                    error: не удалось сохранить пользователя

components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: ok
      additionalProperties: false

    CreateUserRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          description: Имя пользователя (обязательно, непустая строка).
        tags:
          type: array
          items:
            type: string
          description: |
            Список тегов. На сервере к **копии** списка добавляется строка `"new"`, затем значение сериализуется в JSON в колонку `tags`.
        password:
          type: string
          description: |
            Если поле отсутствует, `null` или пустая строка — хеш пароля не записывается.
            Иначе в конец файла паролей дописывается строка PBKDF2 (совместимо с Python `password_storage`).
      additionalProperties: true

    CreatedUserResponse:
      type: object
      required: [id]
      properties:
        id:
          type: integer
          format: int64
          description: Идентификатор вставленной строки (`users.id`).
      additionalProperties: false

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Сообщение об ошибке на русском (как в ответах сервера).
      additionalProperties: false
