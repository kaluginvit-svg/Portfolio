<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Разработка SEO-ядра</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Разработка SEO-ядра</h1>
            <p class="subtitle">ИИ-агент на localhost:11434 (Ollama). Анализ списка URL и генерация совокупного SEO-ядра.</p>
        </header>

        <section class="input-section">
            <label for="urls">Список URL</label>
            <p class="hint">Вставьте ссылки — каждый с новой строки или через запятую.</p>
            <textarea id="urls" rows="6" placeholder="https://example.com&#10;https://competitor2.com&#10;https://competitor3.com"></textarea>
            <div class="row">
                <button type="button" id="analyze" disabled>Анализировать</button>
            </div>
        </section>

        <section class="output-section">
            <div class="panel">
                <h2>Лог выполнения</h2>
                <div id="log" class="log"></div>
            </div>
            <div class="panel">
                <h2>Результат: совокупное SEO-ядро</h2>
                <div id="result" class="result"></div>
            </div>
        </section>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
