<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Игра - Уровень {{ level }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header class="game-header">
            <h1>🎮 SQL Игра</h1>
            <div class="header-controls">
                <a href="/" class="btn-home">🏠 Главная</a>
                <span class="level-badge">Уровень {{ level }}</span>
            </div>
        </header>

        <div class="game-content">
            <div class="task-panel">
                <div id="taskInfo" class="task-info">
                    <h2 id="taskTitle">Загрузка задания...</h2>
                    <p id="taskDescription"></p>
                    <div class="task-meta">
                        <span class="task-category" id="taskCategory"></span>
                        <span class="task-points" id="taskPoints"></span>
                    </div>
                </div>

                <div class="sql-editor">
                    <label for="sqlQuery">Введите SQL запрос:</label>
                    <textarea id="sqlQuery" rows="6" placeholder="SELECT * FROM products;"></textarea>
                    <div class="editor-buttons">
                        <button onclick="checkAnswer()" class="btn-check">✓ Проверить</button>
                        <button onclick="showHint()" class="btn-hint">💡 Подсказка</button>
                        <button onclick="showAnswer()" class="btn-answer">📋 Показать ответ</button>
                    </div>
                </div>

                <div id="result" class="result-panel"></div>
            </div>

            <div class="tasks-list">
                <h3>Задания уровня {{ level }}</h3>
                <div id="tasksList" class="tasks-container">
                    <p>Загрузка заданий...</p>
                </div>
            </div>
        </div>

        <div id="resultTable" class="result-table-container" style="display: none;">
            <h3>Результат запроса:</h3>
            <div class="table-wrapper">
                <table id="resultTableContent"></table>
            </div>
        </div>
    </div>

    <script>
        let currentTask = null;
        let tasks = [];
        let currentTaskIndex = 0;

        // Загрузка заданий
        async function loadTasks() {
            const level = {{ level }};
            try {
                const response = await fetch(`/api/tasks?level=${level}`);
                tasks = await response.json();
                displayTasksList();
                if (tasks.length > 0) {
                    loadTask(0);
                }
            } catch (error) {
                console.error('Ошибка загрузки заданий:', error);
            }
        }

        function displayTasksList() {
            const container = document.getElementById('tasksList');
            container.innerHTML = tasks.map((task, index) => `
                <div class="task-item ${index === currentTaskIndex ? 'active' : ''}" 
                     onclick="loadTask(${index})">
                    <span class="task-number">${index + 1}</span>
                    <span class="task-name">${task.title}</span>
                    <span class="task-points-small">${task.points} очков</span>
                </div>
            `).join('');
        }

        function loadTask(index) {
            if (index < 0 || index >= tasks.length) return;
            
            currentTaskIndex = index;
            currentTask = tasks[index];
            
            document.getElementById('taskTitle').textContent = currentTask.title;
            document.getElementById('taskDescription').textContent = currentTask.description;
            document.getElementById('taskCategory').textContent = currentTask.category;
            document.getElementById('taskPoints').textContent = `${currentTask.points} очков`;
            document.getElementById('sqlQuery').value = '';
            document.getElementById('result').innerHTML = '';
            document.getElementById('resultTable').style.display = 'none';
            
            displayTasksList();
        }

        async function checkAnswer() {
            if (!currentTask) return;
            
            const query = document.getElementById('sqlQuery').value.trim();
            if (!query) {
                showResult('Введите SQL запрос!', false);
                return;
            }

            try {
                const response = await fetch('/api/check', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        task_id: currentTask.id,
                        query: query
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    showResult(data.message, true, data.result, data.columns);
                    if (data.points > 0) {
                        setTimeout(() => {
                            if (confirm(`✓ Правильно! Заработано ${data.points} очков. Перейти к следующему заданию?`)) {
                                if (currentTaskIndex < tasks.length - 1) {
                                    loadTask(currentTaskIndex + 1);
                                } else {
                                    alert('Поздравляем! Вы завершили все задания этого уровня!');
                                }
                            }
                        }, 1000);
                    }
                } else {
                    showResult(data.message, false);
                }
            } catch (error) {
                showResult('Ошибка: ' + error.message, false);
            }
        }

        function showResult(message, success, result = null, columns = null) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result-panel ${success ? 'success' : 'error'}`;
            resultDiv.innerHTML = `<p>${message}</p>`;
            
            if (success && result && columns) {
                displayResultTable(result, columns);
            } else {
                document.getElementById('resultTable').style.display = 'none';
            }
        }

        function displayResultTable(data, columns) {
            const table = document.getElementById('resultTableContent');
            table.innerHTML = '';
            
            // Заголовки
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            columns.forEach(col => {
                const th = document.createElement('th');
                th.textContent = col;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);
            
            // Данные
            const tbody = document.createElement('tbody');
            data.forEach(row => {
                const tr = document.createElement('tr');
                row.forEach(cell => {
                    const td = document.createElement('td');
                    td.textContent = cell !== null ? cell : 'NULL';
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            
            document.getElementById('resultTable').style.display = 'block';
        }

        function showHint() {
            if (currentTask && currentTask.hint) {
                alert(`Подсказка: ${currentTask.hint}`);
            }
        }

        function showAnswer() {
            if (currentTask && currentTask.sql_example) {
                if (confirm('Показать правильный ответ? (очки не будут начислены)')) {
                    document.getElementById('sqlQuery').value = currentTask.sql_example;
                }
            }
        }

        // Загружаем задания при загрузке страницы
        window.onload = function() {
            loadTasks();
        };
    </script>
</body>
</html>
