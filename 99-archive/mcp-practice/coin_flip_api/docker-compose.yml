version: '3.8'

services:
  coin-flip-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coin-flip-api
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/flip')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - coin-flip-network

networks:
  coin-flip-network:
    driver: bridge
