<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подбрасывание Монетки</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>🪙 Подбрасывание Монетки</h1>
        
        <div class="coin-container">
            <div class="coin" id="coin">
                <div class="coin-face" id="coinFace">?</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="flipOnce()">Подбросить 1 раз</button>
            <button class="btn btn-secondary" onclick="flipMultiple(5)">Подбросить 5 раз</button>
            <button class="btn btn-secondary" onclick="flipMultiple(10)">Подбросить 10 раз</button>
            <button class="btn btn-secondary" onclick="flipMultiple(20)">Подбросить 20 раз</button>
            <button class="btn btn-danger" onclick="resetStats()">Сбросить статистику</button>
        </div>

        <div class="stats-container">
            <h2>Статистика</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Всего подбрасываний</div>
                    <div class="stat-value" id="totalFlips">0</div>
                </div>
                <div class="stat-card heads">
                    <div class="stat-label">Орёл</div>
                    <div class="stat-value" id="headsCount">0</div>
                    <div class="stat-percent" id="headsPercent">0%</div>
                </div>
                <div class="stat-card tails">
                    <div class="stat-label">Решка</div>
                    <div class="stat-value" id="tailsCount">0</div>
                    <div class="stat-percent" id="tailsPercent">0%</div>
                </div>
            </div>
        </div>

        <div class="history-container" id="historyContainer">
            <h2>Последние результаты</h2>
            <div class="history" id="history"></div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
