# =============================================================================
# Деплой с Docker Hub: образы <ник>/backend:latest и <ник>/frontend:latest
# Замените YOUR_DOCKERHUB_USER на ваш ник на Docker Hub во всех местах ниже.
# Запуск на сервере: docker compose -f docker-compose.hub.yml up -d
# =============================================================================

# Имя проекта (префикс контейнеров). Можно менять.
name: ux-reviewer

services:
  # ---------------------------------------------------------------------------
  # Backend: API и UX-агент
  # ---------------------------------------------------------------------------
  backend:
    # Образ на Docker Hub. Ник задаётся переменной DOCKERHUB_USER или в .env.
    image: ${DOCKERHUB_USER:-kaluginvit}/backend:latest
    container_name: ux-reviewer-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - app_network

  # ---------------------------------------------------------------------------
  # Frontend: статика через nginx
  # ---------------------------------------------------------------------------
  frontend:
    # Образ на Docker Hub. Ник задаётся переменной DOCKERHUB_USER или в .env.
    image: ${DOCKERHUB_USER:-kaluginvit}/frontend:latest
    container_name: ux-reviewer-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app_network

# -----------------------------------------------------------------------------
# Общая bridge-сеть: backend и frontend в одной сети, общаются по имени сервиса
# (например, из frontend можно обратиться к http://backend:8000 при необходимости)
# -----------------------------------------------------------------------------
networks:
  app_network:
    driver: bridge
    name: ux-reviewer-net
