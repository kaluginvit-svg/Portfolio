services:
  backend:
    build:
      context: .
      dockerfile: Backend-Dockerfile
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    restart: unless-stopped

  # Фронтенд dev: npm install + npm run dev (Vite на порту 3000)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped
    stdin_open: true
    tty: true

  # Фронтенд production: сборка в образе + nginx на 80 (порт 3000 на хосте)
  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    profiles:
      - prod
